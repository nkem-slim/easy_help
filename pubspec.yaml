name: easy_help
description: "Easy Help is post-diagnosis autism support platform for caregivers in Rwanda."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Functional error handling (Either type used in repositories/usecases)
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  firebase_storage: ^12.3.4

  # Navigation
  go_router: ^14.3.0

  # Networking / connectivity
  connectivity_plus: ^6.0.5

  # Local persistence (e.g. caching, offline mode, language pref)
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
